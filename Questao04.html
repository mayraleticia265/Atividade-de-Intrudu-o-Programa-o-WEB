<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contador de 1 a 10</title>
</head>
<body>

    <h2>Contador</h2>

    <button onclick="contar()">Mostrar Números</button>

    <p id="resultado"></p>

    <script>
        function contar() {
            let texto = "";

            for (let i = 1; i <= 10; i++) {
                texto += i + "<br>";
            }

            document.getElementById("resultado").innerHTML = texto;
        }
    </script>

</body>
</html>

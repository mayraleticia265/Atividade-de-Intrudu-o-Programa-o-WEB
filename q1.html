<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alteração de texto na tela</title>
</head>
<body>
     <p id="texto">Este é o texto inicial.</p>

  <button onclick="alterarTexto()">Clique aqui</button>

  <script>
    function alterarTexto() {
      document.getElementById("texto").innerText = "O texto foi alterado!";
    }
  </script>
</body>
</html>
